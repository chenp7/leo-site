<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starship Battle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; cursor: crosshair; touch-action: none; }
canvas { display: block; touch-action: none; }

#mobile-controls {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 20;
  display: none;
  font-family: monospace;
}
#mobile-controls.active { display: block; }
.joystick {
  position: absolute;
  width: 128px;
  height: 128px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.25);
  background: rgba(0,0,0,0.3);
  pointer-events: auto;
  touch-action: none;
}
.joystick .stick {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 56px;
  height: 56px;
  margin-left: -28px;
  margin-top: -28px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.35);
  background: rgba(255,255,255,0.16);
}
#move-pad { left: 18px; bottom: 18px; }
#mobile-actions {
  position: absolute;
  right: 8px;
  bottom: 8px;
  width: 236px;
  height: 236px;
  pointer-events: none;
}
.action-btn {
  position: absolute;
  width: 58px;
  height: 58px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.35);
  background: rgba(0,0,0,0.45);
  color: #fff;
  font: bold 11px/1 monospace;
  touch-action: none;
  pointer-events: auto;
}
.action-btn:active,
.action-btn.is-held {
  background: rgba(120,200,255,0.35);
}
#fire-btn {
  right: 10px;
  bottom: 10px;
  width: 96px;
  height: 96px;
  font-size: 15px;
  border-width: 3px;
  color: #0ff;
  border-color: rgba(0,255,255,0.75);
  box-shadow: 0 0 16px rgba(0,255,255,0.25);
}
#boost-btn { right: 118px; bottom: 28px; color: #8bf; }
#ab1-btn { right: 96px; bottom: 90px; color: #0ff; }
#ab2-btn { right: 52px; bottom: 132px; color: #b4f; }
#ab3-btn { right: -2px; bottom: 112px; color: #ff4; }
@media (max-width: 900px), (pointer: coarse) {
  body { cursor: default; }
}
@media (max-width: 420px) {
  #mobile-actions {
    width: 208px;
    height: 208px;
    right: 6px;
    bottom: 6px;
  }
  .action-btn {
    width: 52px;
    height: 52px;
    font-size: 10px;
  }
  #fire-btn {
    width: 84px;
    height: 84px;
    right: 8px;
    bottom: 8px;
    font-size: 13px;
  }
  #boost-btn { right: 102px; bottom: 24px; }
  #ab1-btn { right: 82px; bottom: 78px; }
  #ab2-btn { right: 46px; bottom: 116px; }
  #ab3-btn { right: 0; bottom: 96px; }
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="mobile-controls" aria-hidden="true">
  <div id="move-pad" class="joystick">
    <div class="stick"></div>
  </div>
  <div id="mobile-actions">
    <button id="fire-btn" class="action-btn" type="button">FIRE</button>
    <button id="boost-btn" class="action-btn" type="button">BOOST</button>
    <button id="ab1-btn" class="action-btn" type="button">EMP</button>
    <button id="ab2-btn" class="action-btn" type="button">SLOW</button>
    <button id="ab3-btn" class="action-btn" type="button">STRIKE</button>
  </div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- Audio System (procedural) ---
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

const SFX = {
  // vol, spatial distance falloff
  play(fn, x, y, vol) {
    if (!audioCtx) return;
    // Spatial: reduce volume based on distance from player
    const dist = Math.hypot((x||player.x) - player.x, (y||player.y) - player.y);
    const spatial = Math.max(0, 1 - dist / 1500);
    const v = (vol || 1) * spatial * 0.35;
    if (v < 0.01) return;
    try { fn(audioCtx, v); } catch(e) {}
  },

  shoot(x, y) {
    this.play((ctx, v) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(800, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.08);
      g.gain.setValueAtTime(v * 0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.08);
    }, x, y);
  },

  enemyShoot(x, y) {
    this.play((ctx, v) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'square'; o.frequency.setValueAtTime(400, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.06);
      g.gain.setValueAtTime(v * 0.15, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.06);
    }, x, y);
  },

  railgun(x, y) {
    this.play((ctx, v) => {
      const o = ctx.createOscillator();
      const o2 = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(1200, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.25);
      o2.type = 'square'; o2.frequency.setValueAtTime(60, ctx.currentTime);
      g.gain.setValueAtTime(v * 0.4, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      o.connect(g); o2.connect(g); g.connect(ctx.destination);
      o.start(); o2.start(); o.stop(ctx.currentTime + 0.25); o2.stop(ctx.currentTime + 0.25);
    }, x, y);
  },

  missile(x, y) {
    this.play((ctx, v) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(300, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.15);
      g.gain.setValueAtTime(v * 0.25, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.15);
    }, x, y);
  },

  shotgun(x, y) {
    this.play((ctx, v) => {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.1, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.03));
      const src = ctx.createBufferSource(); src.buffer = buf;
      const g = ctx.createGain(); g.gain.setValueAtTime(v * 0.5, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
      src.connect(g); g.connect(ctx.destination); src.start();
    }, x, y);
  },

  laser(x, y) {
    this.play((ctx, v) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(1800, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(1400, ctx.currentTime + 0.04);
      g.gain.setValueAtTime(v * 0.12, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.04);
    }, x, y);
  },

  explosion(x, y, big) {
    this.play((ctx, v) => {
      const buf = ctx.createBuffer(1, ctx.sampleRate * (big ? 0.6 : 0.3), ctx.sampleRate);
      const data = buf.getChannelData(0);
      const dur = big ? 0.6 : 0.3;
      for (let i = 0; i < data.length; i++) {
        const t = i / ctx.sampleRate;
        data[i] = (Math.random() * 2 - 1) * Math.exp(-t / (dur * 0.3)) * (1 + Math.sin(t * 60) * 0.5);
      }
      const src = ctx.createBufferSource(); src.buffer = buf;
      const f = ctx.createBiquadFilter(); f.type = 'lowpass';
      f.frequency.setValueAtTime(big ? 400 : 600, ctx.currentTime);
      f.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + dur);
      const g = ctx.createGain(); g.gain.setValueAtTime(v * (big ? 0.6 : 0.4), ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      src.connect(f); f.connect(g); g.connect(ctx.destination); src.start();
    }, x, y);
  },

  hit(x, y) {
    this.play((ctx, v) => {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.02));
      const src = ctx.createBufferSource(); src.buffer = buf;
      const g = ctx.createGain(); g.gain.setValueAtTime(v * 0.2, ctx.currentTime);
      src.connect(g); g.connect(ctx.destination); src.start();
    }, x, y);
  },

  playerHit() {
    this.play((ctx, v) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(200, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.15);
      g.gain.setValueAtTime(v * 0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.15);
    }, player.x, player.y);
  },

  shieldHit() {
    this.play((ctx, v) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(1200, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.1);
      g.gain.setValueAtTime(v * 0.15, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.1);
    }, player.x, player.y);
  },

  pickup() {
    this.play((ctx, v) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(500, ctx.currentTime);
      o.frequency.setValueAtTime(700, ctx.currentTime + 0.06);
      o.frequency.setValueAtTime(900, ctx.currentTime + 0.12);
      g.gain.setValueAtTime(v * 0.2, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.2);
    }, player.x, player.y);
  },

  capture() {
    this.play((ctx, v) => {
      const o = ctx.createOscillator();
      const o2 = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(400, ctx.currentTime);
      o.frequency.setValueAtTime(600, ctx.currentTime + 0.1);
      o.frequency.setValueAtTime(800, ctx.currentTime + 0.2);
      o2.type = 'sine'; o2.frequency.setValueAtTime(600, ctx.currentTime);
      o2.frequency.setValueAtTime(800, ctx.currentTime + 0.1);
      o2.frequency.setValueAtTime(1000, ctx.currentTime + 0.2);
      g.gain.setValueAtTime(v * 0.2, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      o.connect(g); o2.connect(g); g.connect(ctx.destination);
      o.start(); o2.start(); o.stop(ctx.currentTime + 0.35); o2.stop(ctx.currentTime + 0.35);
    }, player.x, player.y);
  },

  allyJoin() {
    this.play((ctx, v) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(500, ctx.currentTime);
      o.frequency.setValueAtTime(700, ctx.currentTime + 0.08);
      o.frequency.setValueAtTime(600, ctx.currentTime + 0.16);
      g.gain.setValueAtTime(v * 0.15, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.25);
    }, player.x, player.y);
  },

  allyDeath(x, y) {
    this.play((ctx, v) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(400, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.3);
      g.gain.setValueAtTime(v * 0.2, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.3);
    }, x, y);
  },

  boost() {
    this.play((ctx, v) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(100, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.1);
      g.gain.setValueAtTime(v * 0.08, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.1);
    }, player.x, player.y);
  },

  bossExplosion(x, y) {
    this.play((ctx, v) => {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 1.0, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        const t = i / ctx.sampleRate;
        data[i] = (Math.random() * 2 - 1) * Math.exp(-t / 0.4) * (1 + Math.sin(t * 40) * 0.8);
      }
      const src = ctx.createBufferSource(); src.buffer = buf;
      const f = ctx.createBiquadFilter(); f.type = 'lowpass';
      f.frequency.setValueAtTime(300, ctx.currentTime);
      f.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 1.0);
      const g = ctx.createGain(); g.gain.setValueAtTime(v * 0.7, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.0);
      src.connect(f); f.connect(g); g.connect(ctx.destination); src.start();
    }, x, y);
  },

  emp(x, y) {
    this.play((ctx, v) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(120, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.4);
      g.gain.setValueAtTime(v * 0.4, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.4);
    }, x, y);
  },

  timeSlow() {
    this.play((ctx, v) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(600, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.5);
      g.gain.setValueAtTime(v * 0.25, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.5);
    }, player.x, player.y);
  },

  orbitalCharge(x, y) {
    this.play((ctx, v) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(200, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.8);
      g.gain.setValueAtTime(v * 0.15, ctx.currentTime);
      g.gain.linearRampToValueAtTime(v * 0.4, ctx.currentTime + 0.8);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.85);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.85);
    }, x, y);
  },

  orbitalBlast(x, y) {
    this.play((ctx, v) => {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.5, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        const t = i / ctx.sampleRate;
        data[i] = (Math.random() * 2 - 1) * Math.exp(-t / 0.15) * (1 + Math.sin(t * 80) * 0.6);
      }
      const src = ctx.createBufferSource(); src.buffer = buf;
      const f = ctx.createBiquadFilter(); f.type = 'lowpass';
      f.frequency.setValueAtTime(500, ctx.currentTime);
      f.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.5);
      const g = ctx.createGain(); g.gain.setValueAtTime(v * 0.6, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      src.connect(f); f.connect(g); g.connect(ctx.destination); src.start();
    }, x, y);
  },

  waveComplete() {
    if (!audioCtx) return;
    try {
      const ctx2 = audioCtx;
      const notes = [500, 600, 700, 900];
      notes.forEach((freq, i) => {
        const o = ctx2.createOscillator();
        const g = ctx2.createGain();
        o.type = 'sine'; o.frequency.value = freq;
        g.gain.setValueAtTime(0.1, ctx2.currentTime + i * 0.1);
        g.gain.exponentialRampToValueAtTime(0.001, ctx2.currentTime + i * 0.1 + 0.2);
        o.connect(g); g.connect(ctx2.destination);
        o.start(ctx2.currentTime + i * 0.1); o.stop(ctx2.currentTime + i * 0.1 + 0.2);
      });
    } catch(e) {}
  },

  shopOpen() {
    this.play((ctx, v) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'triangle'; o.frequency.setValueAtTime(400, ctx.currentTime);
      o.frequency.setValueAtTime(600, ctx.currentTime + 0.08);
      g.gain.setValueAtTime(v * 0.12, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.15);
    }, player.x, player.y);
  },

  purchaseUpgrade() {
    this.play((ctx, v) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(600, ctx.currentTime);
      o.frequency.setValueAtTime(900, ctx.currentTime + 0.06);
      o.frequency.setValueAtTime(1200, ctx.currentTime + 0.12);
      g.gain.setValueAtTime(v * 0.15, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.2);
    }, player.x, player.y);
  },

  asteroidBreak(x, y) {
    this.play((ctx, v) => {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.15, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.05));
      const src = ctx.createBufferSource(); src.buffer = buf;
      const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 800;
      const g = ctx.createGain(); g.gain.setValueAtTime(v * 0.25, ctx.currentTime);
      src.connect(f); f.connect(g); g.connect(ctx.destination); src.start();
    }, x, y);
  },

  gameOver() {
    if (!audioCtx) return;
    try {
      const ctx2 = audioCtx;
      const notes = [300, 250, 200, 150];
      notes.forEach((freq, i) => {
        const o = ctx2.createOscillator();
        const g = ctx2.createGain();
        o.type = 'triangle'; o.frequency.value = freq;
        g.gain.setValueAtTime(0.15, ctx2.currentTime + i * 0.2);
        g.gain.exponentialRampToValueAtTime(0.001, ctx2.currentTime + i * 0.2 + 0.3);
        o.connect(g); g.connect(ctx2.destination);
        o.start(ctx2.currentTime + i * 0.2); o.stop(ctx2.currentTime + i * 0.2 + 0.3);
      });
    } catch(e) {}
  },

  victory() {
    if (!audioCtx) return;
    try {
      const ctx2 = audioCtx;
      const notes = [400, 500, 600, 800, 1000];
      notes.forEach((freq, i) => {
        const o = ctx2.createOscillator();
        const g = ctx2.createGain();
        o.type = 'sine'; o.frequency.value = freq;
        g.gain.setValueAtTime(0.12, ctx2.currentTime + i * 0.12);
        g.gain.exponentialRampToValueAtTime(0.001, ctx2.currentTime + i * 0.12 + 0.25);
        o.connect(g); g.connect(ctx2.destination);
        o.start(ctx2.currentTime + i * 0.12); o.stop(ctx2.currentTime + i * 0.12 + 0.25);
      });
    } catch(e) {}
  }
};

// Init audio on first interaction
['mousedown','keydown'].forEach(evt =>
  window.addEventListener(evt, () => ensureAudio(), { once: false })
);

// --- Helpers ---
function hexToRgba(hex, alpha) {
  if (!hex || hex.charAt(0) !== '#') return `rgba(255,255,255,${alpha})`;
  let r, g, b;
  if (hex.length === 4) {
    r = parseInt(hex[1]+hex[1], 16);
    g = parseInt(hex[2]+hex[2], 16);
    b = parseInt(hex[3]+hex[3], 16);
  } else if (hex.length === 7) {
    r = parseInt(hex.slice(1,3), 16);
    g = parseInt(hex.slice(3,5), 16);
    b = parseInt(hex.slice(5,7), 16);
  } else {
    return `rgba(255,255,255,${alpha})`;
  }
  return `rgba(${r},${g},${b},${alpha})`;
}

function getWaveScaling() { return 1 + (wave - 1) * 0.1; }

function spawnEdgePosition() {
  const side = Math.floor(Math.random() * 4);
  let x, y;
  const margin = 60;
  if (side === 0) { x = margin; y = margin + Math.random() * (MAP_H - margin * 2); }
  else if (side === 1) { x = MAP_W - margin; y = margin + Math.random() * (MAP_H - margin * 2); }
  else if (side === 2) { x = margin + Math.random() * (MAP_W - margin * 2); y = margin; }
  else { x = margin + Math.random() * (MAP_W - margin * 2); y = MAP_H - margin; }
  return { x, y };
}

function spawnWaveEnemy(type) {
  const pos = spawnEdgePosition();
  const scaling = getWaveScaling();
  const e = createEnemy(pos.x, pos.y, type);
  e.health = Math.floor(e.health * scaling);
  e.maxHealth = e.health;
  e.damage = Math.floor(e.damage * scaling);
  enemies.push(e);
  waveEnemiesLeft++;
}

function startNextWave() {
  wave++;
  waveActive = true;
  waveEnemiesLeft = 0;

  const baseCount = 3 + wave * 2;

  // Scouts + fighters every wave
  for (let i = 0; i < Math.ceil(baseCount * 0.4); i++) spawnWaveEnemy('scout');
  for (let i = 0; i < Math.ceil(baseCount * 0.3); i++) spawnWaveEnemy('fighter');

  // Drones from wave 2+
  if (wave >= 2) {
    const droneGroups = Math.min(wave - 1, 4);
    for (let g = 0; g < droneGroups; g++)
      for (let i = 0; i < 5; i++) spawnWaveEnemy('drone');
  }

  // Stealth from wave 3+
  if (wave >= 3) {
    for (let i = 0; i < Math.min(wave - 2, 4); i++) spawnWaveEnemy('stealth');
  }

  // Heavies from wave 3+
  if (wave >= 3) {
    for (let i = 0; i < Math.min(wave - 2, 5); i++) spawnWaveEnemy('heavy');
  }

  // Shielded from wave 4+
  if (wave >= 4) {
    for (let i = 0; i < Math.min(wave - 3, 3); i++) spawnWaveEnemy('shielded');
  }

  // Bosses from wave 5+
  if (wave >= 5) {
    for (let i = 0; i < Math.min(wave - 4, 3); i++) spawnWaveEnemy('boss');
  }

  notify(`WAVE ${wave}`, '#ff0');
}

function addShake(i) { screenShake.intensity = Math.min(screenShake.intensity + i, 18); }

function leadShot(ex, ey, tx, ty, tvx, tvy, bs) {
  const d = Math.hypot(tx-ex, ty-ey);
  const t = d / bs;
  return Math.atan2(ty+tvy*t*0.6-ey, tx+tvx*t*0.6-ex);
}

function isBulletThreat(bx, by, bvx, bvy, ex, ey, threshold) {
  const dx=ex-bx, dy=ey-by;
  const dot=dx*bvx+dy*bvy;
  if(dot<0)return false;
  const pl=dot/(bvx*bvx+bvy*bvy);
  const cx=bx+bvx*pl, cy=by+bvy*pl;
  return Math.hypot(cx-ex,cy-ey)<threshold;
}

function closestThreat(x, y, range) {
  let best = null, bestDist = range;
  enemies.forEach(e => {
    const d = Math.hypot(e.x-x, e.y-y);
    if (d < bestDist) { bestDist = d; best = e; }
  });
  return best;
}

function setupVirtualStick(padEl, state) {
  const stickEl = padEl.querySelector('.stick');
  const maxDist = 40;
  const deadzone = 0.12;

  function reset() {
    state.active = false;
    state.pointerId = null;
    state.x = 0;
    state.y = 0;
    stickEl.style.transform = 'translate(0px, 0px)';
  }

  function update(clientX, clientY) {
    const rect = padEl.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    let dx = clientX - cx;
    let dy = clientY - cy;
    const len = Math.hypot(dx, dy);
    if (len > maxDist) {
      dx = (dx / len) * maxDist;
      dy = (dy / len) * maxDist;
    }
    stickEl.style.transform = `translate(${dx}px, ${dy}px)`;
    state.x = Math.abs(dx / maxDist) < deadzone ? 0 : dx / maxDist;
    state.y = Math.abs(dy / maxDist) < deadzone ? 0 : dy / maxDist;
  }

  padEl.addEventListener('pointerdown', e => {
    e.preventDefault();
    ensureAudio();
    state.active = true;
    state.pointerId = e.pointerId;
    padEl.setPointerCapture(e.pointerId);
    update(e.clientX, e.clientY);
  });
  padEl.addEventListener('pointermove', e => {
    if (!state.active || e.pointerId !== state.pointerId) return;
    e.preventDefault();
    update(e.clientX, e.clientY);
  });
  const release = e => {
    if (e.pointerId !== state.pointerId) return;
    reset();
  };
  padEl.addEventListener('pointerup', release);
  padEl.addEventListener('pointercancel', release);
  padEl.addEventListener('lostpointercapture', () => {
    if (!state.active) return;
    reset();
  });
}

function setupMobileControls() {
  if (!mobileInput.enabled) return;

  setupVirtualStick(document.getElementById('move-pad'), mobileInput.move);

  const setHold = (id, key) => {

      mobileInput[key] = false;
      btn.classList.remove('is-held');
    };
    btn.addEventListener('pointerup', clear);
    btn.addEventListener('pointercancel', clear);
    btn.addEventListener('pointerleave', clear);
  };

  setHold('fire-btn', 'fire');
  setHold('boost-btn', 'boost');

  document.getElementById('ab2-btn').addEventListener('pointerdown', e => { e.preventDefault(); ensureAudio(); triggerTimeSlow(); });

}
